name: CI

on:
  workflow_call:
    inputs:
      package:
        description: "Cargo package to check (empty = whole workspace)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Check typos
        uses: crate-ci/typos@master

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [fmt, read_msrv]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ needs.read_msrv.outputs.msrv }}
          components: clippy
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config mold
      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust
      - name: cargo clippy
        env:
          PACKAGE_FLAG: ${{ inputs.package && format('-p {0}', inputs.package) || '--workspace' }}
        run: |
          # shellcheck disable=SC2086
          cargo clippy --locked $PACKAGE_FLAG --all-targets --features otel -- -D warnings

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config mold
      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust
      - name: cargo doc
        run: cargo doc --locked --no-deps --workspace
        env:
          RUSTDOCFLAGS: -D warnings

  read_msrv:
    name: Read MSRV
    uses: actions-rust-lang/msrv/.github/workflows/msrv.yml@v0.1.1

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: [read_msrv]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ needs.read_msrv.outputs.msrv }}
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config mold
      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust
      - name: cargo build
        run: cargo build --locked --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [clippy]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config mold
      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: cargo nextest run
        env:
          PACKAGE_FLAG: ${{ inputs.package && format('-p {0}', inputs.package) || '--workspace' }}
          TEST_DATABASE_URL: "host=127.0.0.1 port=5432 user=test password=test dbname=postgres"
        run: |
          # shellcheck disable=SC2086
          cargo nextest run --locked $PACKAGE_FLAG --all-targets

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [clippy]
    environment: codecov
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config mold
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Restore cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust
      - name: Collect coverage
        env:
          PACKAGE_FLAG: ${{ inputs.package && format('-p {0}', inputs.package) || '--workspace' }}
          TEST_DATABASE_URL: "host=127.0.0.1 port=5432 user=test password=test dbname=postgres"
        run: |
          # shellcheck disable=SC2086
          cargo llvm-cov nextest --locked $PACKAGE_FLAG --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
